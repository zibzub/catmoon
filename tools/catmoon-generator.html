<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMoon</title>
    <link rel="stylesheet" href="catmoon-generator.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
          "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div id="background" aria-hidden="true">
      <div id="small-stars"></div>
      <div id="large-stars"></div>
    </div>
    <canvas id="scene"></canvas>
    <canvas id="rhombusScene"></canvas>

    <div id="hud">
      <button id="hudLockButton" type="button" aria-label="Unlock MoonCat details" title="Unlock MoonCat details">🔒</button>
      <div>Cat: <span id="catId">-</span></div>
      <div id="preview" aria-hidden="true"></div>
    </div>

    <div id="tooltip"></div>
    <div id="loadingOverlay">
      <div id="loadingCard">
        <div id="loadingSpinner"></div>
        <div id="loadingTitle">Loading CatMoon</div>
        <div id="loadingProgress">Preparing faces...</div>
      </div>
    </div>
    <div id="projectionControls" aria-label="Projection mode">
      <button id="sphereButton" class="active" type="button">Sphere</button>
      <button id="cubeButton" type="button">Cube</button>
      <button id="rhombusGridButton" type="button">Rhombus Grid</button>
      <button id="packedRhombusButton" type="button">Packed Rhombus</button>
      <button id="goldenPatternButton" type="button">Golden Pattern</button>
      <button id="triacontahedronButton" type="button">Triacontahedron</button>
    </div>
    <div id="status">Drag to rotate. Scroll or pinch to zoom. Click a hovered cat to open its rescue page.</div>

    <script type="module" src="catmoon-generator.js"></script>
  </body>
</html>
