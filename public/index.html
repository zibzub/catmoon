<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatMoon</title>
    <meta property="og:type" content="website">
    <meta property="og:title" content="CatMoon">
    <meta property="og:description" content="Rotate every MoonCat in your mind.">
    <meta property="og:url" content="https://catmoon.zibzub.art/">
    <meta property="og:image" content="https://catmoon.zibzub.art/img/preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CatMoon">
    <meta name="twitter:description" content="Rotate every MoonCat in your mind.">
    <meta name="twitter:image" content="https://catmoon.zibzub.art/img/preview.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="android-chrome" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="background" aria-hidden="true">
      <div id="small-stars"></div>
      <div id="large-stars"></div>
    </div>
    <canvas id="scene"></canvas>

    <div id="hud" class="locked">
      <button id="hudLockButton" type="button" aria-label="Unlock MoonCat details" title="Unlock MoonCat details">🔒</button>
      <div id="hudDetails">
        <div id="catSummary">
          <div>Cat: <span id="catId">-</span></div>
          <div id="preview" aria-hidden="true"></div>
        </div>
        <div id="status">Drag to rotate. Scroll or pinch to zoom. Click a hovered cat to open its rescue page.</div>
      </div>
    </div>

    <div id="tooltip"></div>
    <div id="loadingOverlay">
      <div id="loadingCard">
        <div id="loadingSpinner"></div>
        <div id="loadingTitle">Loading CatMoon</div>
        <div id="loadingProgress">Preparing faces...</div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
